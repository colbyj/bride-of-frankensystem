{% extends "template.html" %}
{% block head %}
    <script type="text/javascript">
        $(document).ready(function () {

            function dppx() {
                // devicePixelRatio: Webkit (Chrome/Android/Safari), Opera (Presto 2.8+), FF 18+
                return typeof window == 'undefined' ? 0 : +window.devicePixelRatio || ie() || 0
            }

            $("#screenWidth").val(window.screen.width);
            $("#screenHeight").val(window.screen.height);
            $("#innerWidth").val(window.innerWidth);
            $("#innerHeight").val(window.innerHeight);
            $("#dppx").val(dppx());

            $("#consentDiv").load("{{ url_for('consent_html') }}");
        });
    </script>

    <style>
        .hny{
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            height: 0;
            width: 0;
            z-index: -1;
        }
    </style>
{% endblock %}

{% block content %}

    <form id="form" method="post" novalidate>

        <input type="hidden" id="dppx" name="dppx">
        <input type="hidden" id="screenWidth" name="screenWidth">
        <input type="hidden" id="screenHeight" name="screenHeight">
        <input type="hidden" id="innerWidth" name="innerWidth">
        <input type="hidden" id="innerHeight" name="innerHeight">

        <div id="instructions" style="font-style: italic;">Before proceeding, please read the following. You must give your consent to continue.</div>

        <div class="bofs-question">
            <div class="bofs-padding" id="consentDiv">

            </div>
        </div>

        <div class="bofs-question">
            <div class="bofs-padding">
                <b>Do you give your consent?</b>
                <div class="bofs-question-inputs">
                    <div class="bofs-form-check">
                        <label class="bofs-form-check-label">
                            <input class="bofs-form-check-input" type="radio" name="consent" id="consentYes" value="1" required>
                            I give my consent
                        </label>
                    </div>
                    <div class="bofs-form-check">
                        <label class="bofs-form-check-label">
                            <input class="bofs-form-check-input" type="radio" name="consent" id="consentNo" value="0" required>
                            I do not give my consent
                        </label>
                    </div>
                </div>
                <div class="bofs-invalid-feedback">
                    You must provide your consent to continue.
                </div>
                <div class="hny">
                    <input type="email" name="email" id="email" value="">
                    <label for="email">Enter your email</label>
                </div>
            </div>
        </div>

        {{ btnContinue() }}

        <br>
    </form>

    <form method="post" action="{{ config['APPLICATION_ROOT'] }}/decline_consent"
          style="margin-top: 8px;">
        <button type="submit" class="bofs-btn bofs-btn-decline">I do not consent</button>
    </form>

    <script>
        // Block submission unless the "I consent" radio is checked, and reveal the feedback message.
        (function () {
            'use strict';
            window.addEventListener('load', function () {
                // Fetch all the forms we want to apply custom Bootstrap validation styles to
                var form = document.getElementById('form');
                var consentYes = document.getElementById('consentYes');

                form.addEventListener('submit', function (event) {
                    if (consentYes.checked !== true) {
                        document.getElementsByClassName('bofs-invalid-feedback').item(0).style.display = 'block';
                        event.preventDefault();
                        event.stopPropagation();
                    }
                }, false);

            }, false);
        })();
    </script>

{% endblock %}
