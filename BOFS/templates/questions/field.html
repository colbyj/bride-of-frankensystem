{# Single-line text input.

   Args:
       placeholder (str, optional): Greyed-out hint shown when the field is
           empty.
       width (int, optional): Pixel width of the input. Defaults to the
           project's DEFAULT_FIELD_WIDTH config value.
#}
<input class="bofs-form-control"
       type="text"
       name="{{ question.id }}"
       id="{{ question.id }}"
       placeholder="{{ question.placeholder }}"
       {% if question.has_value %}value="{{ question.value|e }}"{% endif %}
       style="width: {{ question.width if question.width else config['DEFAULT_FIELD_WIDTH'] }}px; height: 36px;"
       {{ "required" if question.required }}>
