{# Single numeric input.

   Args:
       min (float, optional): Minimum accepted value. Browsers will reject
           submissions below this.
       max (float, optional): Maximum accepted value.
       width (int, optional): Pixel width of the input. Defaults to the
           project's DEFAULT_FIELD_WIDTH config value.
#}
<input class="bofs-form-control"
       type="number"
       name="{{ question.id }}"
       id="{{ question.id }}"
       {{ 'min=%s' % question.min if question.min }}
       {{ 'max=%s' % question.max if question.max }}
       {% if question.has_value %}value="{{ question.value }}"{% endif %}
       style="width: {{ question.width if question.width else config['DEFAULT_FIELD_WIDTH'] }}px; height: 36px;" {{ "required" if question.required }}>
